<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Paths</title>
    <script src="https://unpkg.com/rxjs@7.5.5/dist/bundles/rxjs.umd.min.js"></script>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <!-- Nirby: Embed Code Start -->
<iframe
    src="https://prime-embed.nir.by/embed/CtY49FV1c93Q9tE7nWes44T17rdrGZVnaqTW8qaZDYKYLieB4j3skLuBtEE17sgB7Rm"
    style="width: 800px; height: 450px; border: 0; overflow: hidden;"
    allow="autoplay; fullscreen"
></iframe>
<!-- Nirby: Embed Code End -->

</body>
<footer>
    <script>
        // Create the application helper and add its render target to the page
        let app = new PIXI.Application({ width: 640, height: 360 });
        document.body.appendChild(app.view);
  
        // Create the sprite and add it to the stage
        let sprite = PIXI.Sprite.from('sample.png');
        app.stage.addChild(sprite);
  
        // Add a ticker callback to move the sprite back and forth
        let elapsed = 0.0;
        app.ticker.add((delta) => {
          elapsed += delta;
          sprite.x = 100.0 + Math.cos(elapsed/50.0) * 100.0;
        });
      </script>
    </body>
</footer>
</html>
