<body>

        <b>

        </b>

<footer>
    <script>
        const DateTime = luxon.DateTime;
        console.log('The DateTime class is now available in the global scope.');

        const now = DateTime.local();
        document.getElementById('now').innerText = now.toLocaleString();
    </script>
